<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Healthcare Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-box">
                <h2 class="brand-title">Healthcare Analytics</h2>
                <p class="brand-subtitle">Decision Support Platform</p>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item">Home</a>
                <a href="/insurance-dashboard" class="nav-item">Insurance Dashboard</a>
                <a href="/pharma-dashboard" class="nav-item">Pharma Dashboard</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1 class="page-heading">{% block page_heading %}Dashboard{% endblock %}</h1>
                    <p class="page-subheading">{% block page_subheading %}Analytics view{% endblock %}</p>
                </div>
            </header>

            <section class="content-wrapper">
                {% block content %}{% endblock %}
            </section>
        </main>
    </div>

</body>
</html>
